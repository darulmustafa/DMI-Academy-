<!doctype html>
<html lang="bn" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ব্যয় রশিদ | Expense Voucher - দারুল মোস্তফা সাঃ ইসলামী একাডেমি</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <style>
    :root { --primary-green: #0d6e3f; --secondary-gold: #c9a227; --dark-text: #1a1a2e; }
    * { font-family: 'Hind Siliguri', sans-serif; }
    body { background: linear-gradient(135deg, #f0fdf4 0%, #fef3c7 100%); }
    .search-container { background: linear-gradient(135deg, rgba(13, 110, 63, 0.95) 0%, rgba(201, 162, 39, 0.95) 100%); }
    .search-input { border: 2px solid rgba(255, 255, 255, 0.3); background: rgba(255, 255, 255, 0.95); }
    .btn-primary { background: linear-gradient(135deg, var(--primary-green) 0%, #1a8f5c 100%); color: white; padding: 12px 24px; border-radius: 8px; border: none; cursor: pointer; }
    .voucher-card { background: white; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
  </style>
</head>
<body class="h-full overflow-auto">
  <div id="app" class="h-full flex flex-col">
    <div class="search-container sticky top-0 z-40 no-print">
      <div class="max-w-6xl mx-auto p-4 md:p-6">
        <div class="mb-6 text-white text-center">
          <h1 class="text-2xl font-bold">দারুল মোস্তফা সাঃ ইসলামী একাডেমি</h1>
        </div>

        <div class="bg-white/10 backdrop-blur-md rounded-xl p-4 max-w-2xl mx-auto">
          <label class="block text-white text-sm font-bold mb-3 font-bengali">
            ব্যয় রশিদ তৈরি করুন | Generate Expense Voucher
          </label>
          <div class="flex gap-3 flex-wrap items-end">
            <input type="hidden" id="type-filter" value="Expense"> 
            
            <div class="flex-1 min-w-[200px]">
              <label class="text-white text-xs font-semibold mb-1 block font-bengali">
                তারিখ নির্বাচন করুন | Select Date
              </label> 
              <input type="date" id="date-filter" class="search-input w-full px-4 py-3 rounded-lg font-english">
            </div>
            
            <button onclick="generateVoucher()" class="btn-primary">
              <span class="font-bengali">রশিদ তৈরি করুন</span>
            </button>
          </div>
        </div>
      </div>
    </div>

    </div>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyF8Qlq36ssBFhnVH789tmTaZkoBuAchjbAEKvj64Etrfpp71Dj05PuNn1DBA3ZDUydwQ/exec';
    
    // আপনার আগের JS ফাংশনগুলো এখানে থাকবে
    async function generateVoucher() {
      const typeFilter = document.getElementById('type-filter').value; // এখন এটি সরাসরি 'Expense' পাবে
      const dateFilter = document.getElementById('date-filter').value;
      
      if (!dateFilter) {
        alert('অনুগ্রহ করে তারিখ নির্বাচন করুন');
        return;
      }
      
      // বাকি Fetch লজিক আগের মতোই কাজ করবে
      try {
        const response = await fetch(`${SCRIPT_URL}?type=${typeFilter}&date=${dateFilter}`);
        const data = await response.json();
        // ... (বাকি কোড)
      } catch (e) {
        console.error(e);
      }
    }
    
    window.addEventListener('load', () => {
      document.getElementById('date-filter').value = new Date().toISOString().split('T')[0];
    });
  </script>
</body>
</html>
